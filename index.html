<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawApp Pro – Joonistamine</title>
    
    <style>
        /* === ПЕРЕМЕННЫЕ И ОСНОВНЫЕ НАСТРОЙКИ === */
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --text-light: #f8fafc;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* === ТООРИИСТАРИБА (TOOLBAR) === */
        .toolbar {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .controls { display: flex; gap: 2rem; align-items: center; }
        .control-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }

        /* === ДИЗАЙН ХОЛСТА (CANVAS) === */
        .canvas-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        canvas {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
            max-width: 100%;
            transition: transform 0.3s ease;
        }

        /* === КНОПКИ И ДЕЙСТВИЯ === */
        button {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }

        .btn-secondary { background: #334155; color: white; }
        .btn-secondary:hover { background: #475569; }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.9; }

        /* === ГАЛЕРЕЯ РИСУНКОВ === */
        .gallery-container {
            padding: 3rem 2rem;
            background: #111827;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
            border-radius: 0.5rem;
        }

        /* === КНОПКА ПОРТФОЛИО === */
        .portfolio-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: block;
            text-align: center;
            background: #4a0000;
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid #777;
            font-size: 14px;
            transition: 0.3s;
            z-index: 1000;
        }
        .portfolio-link:hover {
            background: #ff4400;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="toolbar">
        <div class="logo">🎨 DrawApp</div>
        
        <div class="controls">
            <div class="control-item">
                <label for="colorPicker">Värv:</label>
                <input type="color" id="colorPicker" value="#6366f1">
            </div>
            
            <div class="control-item">
                <label for="lineWidth">Paksus:</label>
                <input type="range" id="lineWidth" min="1" max="50" value="8">
            </div>

            <div class="actions">
                <button id="clearCanvas" class="btn-secondary" title="Puhasta lõuend">Puhasta</button>
                <button id="saveDrawing" class="btn-primary">Salvesta galeriisse</button>
            </div>
        </div>
    </header>

    <main class="canvas-area">
        <canvas id="paintCanvas"></canvas>
    </main>

    <section class="gallery-container">
        <div class="gallery-header">
            <h2>Minu galerii</h2>
            <button id="clearGallery" class="btn-danger">Kustuta kõik</button>
        </div>
        <div id="gallery" class="gallery-grid">
            </div>
    </section>

    <a href="https://cerber-portfolio.netlify.app/" target="_blank" class="portfolio-link">
        Minu Portfoolio
    </a>

    <script src="script.js"></script>
</body>
</html>
